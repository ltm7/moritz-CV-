name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /Moritz-CV-

      - name: Check output directory
        run: |
          if [ -d "./out" ]; then
            echo "=== Output Directory Size ==="
            du -sh ./out
            echo ""
            echo "=== Largest Files ==="
            find ./out -type f -size +1M -exec ls -lh {} \; | awk '{print $5, $9}' | sort -rh | head -20
            echo ""
            echo "=== Total File Count ==="
            find ./out -type f | wc -l
            echo ""
            echo "=== Checking for symlinks and hard links ==="
            find ./out -type l | wc -l
            echo "symlinks found"
          else
            echo "Output directory not found"
          fi

      - name: Fix symlinks and hard links
        run: |
          if [ -d "./out" ]; then
            # Remove all symlinks
            find ./out -type l -delete
            echo "Symlinks removed"

            # Check for hard links (inode count > 1) and copy them
            find ./out -type f -links +1 -exec sh -c 'cp "$1" "$1.tmp" && mv "$1.tmp" "$1"' _ {} \;
            echo "Hard links resolved"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./out
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
